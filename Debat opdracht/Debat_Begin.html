<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Leestekst</title>
  <link rel="stylesheet" href="../style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* page should not scroll */
    html, body { height: 100%; overflow: hidden; }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar_left">
      <img class="topbar_icon" src="../img/book.svg" alt="" aria-hidden="true" />
      <h1 class="topbar_title">Cito Leestoets</h1>
    </div>
  </header>

  
  <div class="claim">
  Het regenboogdieet is een betrouwbare manier om gezond te eten
</div>
    
  <!-- Team A (left group) -->
  <div class="team_A_row">
    <div class="team_A_character">
      <img id="team_A_img" src="../img/Team A_Praat.svg" alt="Team A" />
    </div>

    <div class="team_A_content">
      <div class="speech" role="group" aria-label="Opdracht">
        <p class="speech_hint" id="reageren_hint">selecteer het juiste antwoord</p>
      </div>

      <form class="answers" aria-label="Antwoorden Team A">
        <fieldset class="answers_fieldset">
          <legend class="answers_legend">Kies één antwoord</legend>

          <label class="answer">
            <input class="answer_radio" type="radio" name="teamA_reason" value="a1" />
            <span class="answer_text">Wij zijn het wel eens met de stelling, want het regenboogdieet zorgt ervoor dat mensen meer verschillende voedingsstoffen binnenkrijgen</span>
          </label>

          <label class="answer">
            <input class="answer_radio" type="radio" name="teamA_reason" value="a2" />
            <span class="answer_text">Wij zijn het wel eens met de stelling, want het regenboogdieet houdt rekening met alle belangrijke voedingsstoffen</span>
          </label>

          <label class="answer">
            <input class="answer_radio" type="radio" name="teamA_reason" value="a3" />
            <span class="answer_text">Wij zijn het niet eens met de stelling, want het regenboogdieet houdt geen rekening met alle belangrijke voedingsstoffen</span>
          </label>

          <label class="answer">
            <input class="answer_radio" type="radio" name="teamA_reason" value="a4" />
            <span class="answer_text">Wij zijn het niet eens met de stelling, want de tekst zegt dat het dieet niet betrouwbaar is</span>
          </label>
        </fieldset>
      </form>
    </div>
  </div>

  <!-- Team B (right character) -->
  <!-- IMPORTANT: fixed so it always hugs the right edge of the viewport -->
  <section class="team_B_character" style="position: fixed; top: 137px; right: 24px;">
    <img id="team_B_img" src="../img/Team_B_Stil.svg" alt="Team B" />

    <button type="button" class="btn" id="debat_begin_volgende" disabled>
                    Volgende
                    <img class="btn_icon" src="../img/arrow-right.svg" alt="" aria-hidden="true" />
    </button>
  </section>
  
     
  <script src="../script.js"></script>
</body>
</html>

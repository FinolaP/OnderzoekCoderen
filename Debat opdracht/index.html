<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Navigeren naar leesbegrip</title>
  <link rel="stylesheet" href="../style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <header class="topbar">
    <div class="topbar_left">
      <img class="topbar_icon" src="../img/book.svg" alt="" aria-hidden="true" />
      <h1 class="topbar_title">Cito Leestoets</h1>
    </div>
  </header>

  <main class="page">
    <section class="content">

    
      <div class="content_stack">

        <p class="intro_text">
Je leest straks een tekst over het regenboogdieet. Daarna bedenk je voor- en tegenargumenten. Tot slot voer je een debat over dit onderwerp.       </p>

        <h2 class="question_text">Met wie wil jij in het team zitten voor een debat?</h2>

        <form class="choices" id="templateForm">
          <label class="choice">
            <input type="radio" name="template" value="Team A" />
            <div class="choice_box">
              <img class="choice_img" src="../img/gee_me_037.svg" alt="Groep A" />
              <div class="choice_label">Groep A</div>
              <div class="choice_dot"></div>
            </div>
          </label>

          <label class="choice">
            <input type="radio" name="template" value="stoer" />
            <div class="choice_box">
              <img class="choice_img" src="../img/gee_me_081.svg" alt="Groep B" />
              <div class="choice_label">Groep B</div>
              <div class="choice_dot"></div>
            </div>
          </label>
        </form>

        <div class="actions">
          <button type="button" class="btn" id="debat_index_volgende" disabled>
            Volgende
            <img class="btn_icon" src="../img/arrow-right.svg" alt="" aria-hidden="true" />
          </button>
        </div>

      </div>
      <!-- end content_stack -->

    </section>
  </main>
<script src="../script.js"></script>
</body>
</html>
